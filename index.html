<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="theme-color" content="#ffffff">
<title>Life OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efeb;
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9e98;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 10px;
    --radius-lg: 14px;
    --font: 'DM Sans', system-ui, sans-serif;
    --bottom-nav-h: 68px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --bg2: #242422;
      --bg3: #2e2e2b;
      --text: #f0efeb;
      --text2: #9e9e98;
      --text3: #6b6b66;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
  }
  /* Header */
  .header {
    padding: 14px 16px 10px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; }
  .app-title { font-size: 20px; font-weight: 500; letter-spacing: -0.4px; }
  .app-date { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .progress-bar-wrap { margin-top: 10px; height: 3px; background: var(--border); border-radius: 2px; }
  .progress-bar-fill { height: 100%; border-radius: 2px; background: #639922; transition: width .4s ease; }
  /* Scroll area */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 16px 16px;
  }
  /* Bottom nav */
  .bottom-nav {
    height: var(--bottom-nav-h);
    border-top: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: var(--bg);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 10px;
    font-family: var(--font);
    font-weight: 400;
    transition: color .15s;
  }
  .nav-btn.active { color: var(--text); font-weight: 500; }
  .nav-btn i { font-size: 22px; }
  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 0 0 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  /* Routine row */
  .routine-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: var(--radius);
    background: var(--bg);
    border: 0.5px solid var(--border);
    margin-bottom: 7px;
    min-height: 58px;
    transition: background .15s;
  }
  .routine-row.done { background: var(--bg2); }
  .color-bar { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
  .check-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    transition: background .15s;
  }
  .routine-content { flex: 1; min-width: 0; }
  .routine-title {
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color .15s;
  }
  .routine-title.done { color: var(--text2); text-decoration: line-through; }
  .routine-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
  .area-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .area-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .meta-tag { font-size: 11px; color: var(--text3); }
  .action-btns { display: flex; gap: 2px; }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 6px;
    border-radius: 6px;
    display: flex;
    font-size: 18px;
  }
  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text2);
  }
  .empty-state i { font-size: 36px; display: block; margin-bottom: 12px; color: var(--text3); }
  .empty-title { font-weight: 500; color: var(--text); margin-bottom: 6px; font-size: 15px; }
  /* Buttons */
  .btn {
    padding: 10px 18px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-family: var(--font);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 400;
    min-height: 44px;
  }
  .btn-primary {
    border: none;
    color: #fff;
    font-weight: 500;
  }
  .btn:disabled { opacity: .4; cursor: default; }
  /* FAB */
  .fab {
    position: absolute;
    bottom: calc(var(--bottom-nav-h) + 16px + env(safe-area-inset-bottom, 0px));
    right: 16px;
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    background: #1a1a18;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,.2);
    z-index: 10;
    transition: transform .15s;
  }
  @media (prefers-color-scheme: dark) {
    .fab { background: #f0efeb; color: #1a1a18; }
  }
  .fab:active { transform: scale(0.93); }
  /* Week grid */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }
  .week-cell {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 5px;
    min-height: 80px;
  }
  .week-cell.today { border: 1.5px solid var(--border2); background: var(--bg2); }
  .week-dow { font-size: 10px; color: var(--text3); margin-bottom: 1px; }
  .week-dom { font-size: 16px; margin-bottom: 5px; }
  .week-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 2px; }
  .week-dot { width: 7px; height: 7px; border-radius: 50%; }
  .week-count { font-size: 10px; color: var(--text3); }
  /* Area filter chips */
  .chip-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip {
    padding: 5px 11px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    color: var(--text2);
    display: flex; align-items: center; gap: 4px;
    min-height: 32px;
    white-space: nowrap;
  }
  .chip.active { font-weight: 500; }
  /* Form */
  .form-view { padding-bottom: 80px; }
  .form-back {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 14px; font-family: var(--font);
    padding: 0; margin-bottom: 16px; min-height: 44px;
  }
  .form-back i { font-size: 20px; }
  .form-title { font-size: 17px; font-weight: 500; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    display: block;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 11px 13px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px; /* Prevents iOS zoom */
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--border2);
    background: var(--bg);
  }
  .field textarea { resize: vertical; }
  .field select { -webkit-appearance: none; }
  /* Pill group */
  .pill-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill {
    padding: 7px 13px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text2);
    display: flex; align-items: center; gap: 5px;
    min-height: 36px;
    white-space: nowrap;
  }
  .pill.active { font-weight: 500; }
  /* DOW picker */
  .dow-picker { display: flex; gap: 6px; }
  .dow-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    color: var(--text2);
    display: flex; align-items: center; justify-content: center;
  }
  .dow-btn.active { color: #fff; border: none; }
  /* Progress wheel */
  .wheel-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .stat-name { font-size: 13px; width: 100px; flex-shrink: 0; }
  .stat-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
  .stat-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
  .stat-pct { font-size: 13px; font-weight: 500; color: var(--text2); width: 36px; text-align: right; }
  /* Sync toolbar */
  .sync-bar {
    display: flex; gap: 8px; margin-bottom: 16px;
    padding: 10px 12px;
    background: var(--bg2);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    flex-wrap: wrap;
  }
  .sync-bar .btn { font-size: 13px; padding: 7px 12px; min-height: 36px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const AREAS = [
  {id:'spiritual',   name:'Spiritual',    type:'personal', hex:'#7F77DD', bg:'#EEEDFE', dark:'#3C3489'},
  {id:'financial',   name:'Financial',    type:'personal', hex:'#BA7517', bg:'#FAEEDA', dark:'#633806'},
  {id:'health',      name:'Health',       type:'personal', hex:'#639922', bg:'#EAF3DE', dark:'#27500A'},
  {id:'relationship',name:'Relationship', type:'personal', hex:'#D4537E', bg:'#FBEAF0', dark:'#72243E'},
  {id:'adventure',   name:'Adventure',    type:'personal', hex:'#D85A30', bg:'#FAECE7', dark:'#712B13'},
  {id:'contribution',name:'Contribution', type:'personal', hex:'#1D9E75', bg:'#E1F5EE', dark:'#085041'},
  {id:'growth',      name:'Growth',       type:'personal', hex:'#378ADD', bg:'#E6F1FB', dark:'#0C447C'},
  {id:'showmasters', name:'Showmasters',  type:'work',     hex:'#E24B4A', bg:'#FCEBEB', dark:'#791F1F'},
  {id:'superkicks',  name:'Super Kicks',  type:'work',     hex:'#185FA5', bg:'#EEF5FD', dark:'#042C53'},
  {id:'hawthxrn',    name:'Hawthxrn',     type:'work',     hex:'#3B6D11', bg:'#EDF5E2', dark:'#173404'},
  {id:'nonprofit',   name:'Nonprofit',    type:'work',     hex:'#0F6E56', bg:'#E3F5EE', dark:'#04342C'},
];

const FREQ = [
  {id:'daily',      label:'Daily'},
  {id:'2x_week',    label:'2× per week',   dow:true},
  {id:'3x_week',    label:'3× per week',   dow:true},
  {id:'weekly',     label:'Weekly',         dow:true},
  {id:'2x_month',   label:'2× per month'},
  {id:'monthly',    label:'Monthly',        dom:true},
  {id:'quarterly',  label:'Quarterly'},
  {id:'semiannual', label:'Semi-annually'},
  {id:'annual',     label:'Annually',       annual:true},
  {id:'multiyear',  label:'Every few years'},
];

const SLOTS = [
  {id:'morning',   label:'Morning',   icon:'ti-sunrise'},
  {id:'afternoon', label:'Afternoon', icon:'ti-sun-high'},
  {id:'evening',   label:'Evening',   icon:'ti-moon'},
  {id:'anytime',   label:'Anytime',   icon:'ti-clock'},
];

const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function ds(d) {
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}
const TODAY = ds(new Date());

function getA(id) { return AREAS.find(a => a.id === id) || AREAS[0]; }

function isDue(r, dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay(), dom = d.getDate(), mo = d.getMonth();
  switch(r.frequency) {
    case 'daily': return true;
    case '2x_week': case '3x_week': case 'weekly':
      return (r.daysOfWeek || []).includes(dow);
    case '2x_month': return dom === 1 || dom === 15;
    case 'monthly': return dom === (r.dayOfMonth || 1);
    case 'quarterly': return [0,3,6,9].includes(mo) && dom === 1;
    case 'semiannual': return [0,6].includes(mo) && dom === 1;
    case 'annual': return mo === (r.annualMonth||0) && dom === (r.annualDay||1);
    default: return false;
  }
}

function ck(rid, dateStr) { return rid + '__' + dateStr; }

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  tab: 'today',
  routines: [],
  completions: {},
  addView: false,
  editRoutine: null,
  filterArea: 'all',
  form: blankForm(),
};

function blankForm() {
  return {title:'', areaId:'spiritual', frequency:'daily', timeOfDay:'morning',
          daysOfWeek:[], dayOfMonth:1, annualMonth:0, annualDay:1, duration:'', notes:''};
}

function load() {
  try {
    const r = localStorage.getItem('lifeos_routines');
    const c = localStorage.getItem('lifeos_completions');
    if (r) state.routines = JSON.parse(r);
    if (c) state.completions = JSON.parse(c);
  } catch(e) {}
  render();
}

function saveR() { localStorage.setItem('lifeos_routines', JSON.stringify(state.routines)); }
function saveC() { localStorage.setItem('lifeos_completions', JSON.stringify(state.completions)); }

function toggle(rid) {
  const k = ck(rid, TODAY);
  state.completions[k] = !state.completions[k];
  saveC(); render();
}
function isDone(rid) { return !!state.completions[ck(rid, TODAY)]; }

function openAdd() {
  state.editRoutine = null;
  state.form = blankForm();
  state.addView = true;
  render();
}
function openEdit(id) {
  const r = state.routines.find(x => x.id === id);
  if (!r) return;
  state.editRoutine = r;
  state.form = {...r, daysOfWeek: [...(r.daysOfWeek||[])]};
  state.addView = true;
  render();
}
function cancelAdd() { state.addView = false; state.editRoutine = null; render(); }

function saveRoutine() {
  const f = state.form;
  if (!f.title.trim()) return;
  const r = {...f, title: f.title.trim()};
  if (state.editRoutine) {
    r.id = state.editRoutine.id;
    state.routines = state.routines.map(x => x.id === r.id ? r : x);
  } else {
    r.id = 'r' + Date.now();
    state.routines.push(r);
  }
  state.addView = false;
  state.editRoutine = null;
  saveR(); render();
}

function delRoutine(id) {
  if (!confirm('Delete this routine?')) return;
  state.routines = state.routines.filter(r => r.id !== id);
  saveR(); render();
}

function setF(k, v) { state.form[k] = v; render(); }
function togDOW(i) {
  const d = [...(state.form.daysOfWeek||[])];
  const idx = d.indexOf(i);
  if (idx >= 0) d.splice(idx, 1); else d.push(i);
  setF('daysOfWeek', d);
}

// Export / Import
function exportData() {
  const data = JSON.stringify({routines: state.routines, completions: state.completions}, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'lifeos-backup-' + TODAY + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.routines) state.routines = data.routines;
        if (data.completions) state.completions = data.completions;
        saveR(); saveC(); render();
        alert('Data imported successfully!');
      } catch(err) {
        alert('Could not read file. Make sure it\'s a Life OS backup.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Helpers
function prettify(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
}

function weekDates() {
  const d = new Date(TODAY + 'T12:00:00');
  const dow = d.getDay();
  return Array.from({length:7}, (_,i) => {
    const dd = new Date(d);
    dd.setDate(dd.getDate() - dow + i);
    return ds(dd);
  });
}

// ── HTML builders ─────────────────────────────────────────────────────────────
function badge(areaId) {
  const a = getA(areaId);
  return `<span class="area-badge" style="background:${a.bg};color:${a.dark}">
    <span class="area-dot" style="background:${a.hex}"></span>${a.name}
  </span>`;
}

function routineRow(r, opts={}) {
  const a = getA(r.areaId);
  const done = opts.checkable ? isDone(r.id) : false;
  const freq = FREQ.find(f => f.id === r.frequency);
  const slot = SLOTS.find(s => s.id === r.timeOfDay);
  return `<div class="routine-row${done?' done':''}">
    <div class="color-bar" style="background:${a.hex}"></div>
    ${opts.checkable ? `<button class="check-btn" onclick="toggle('${r.id}')" style="border:${done?'none':`1.5px solid ${a.hex}`};background:${done?a.hex:'transparent'}" aria-label="${done?'Mark incomplete':'Mark complete'}">
      ${done ? '<i class="ti ti-check" style="font-size:13px;color:#fff"></i>' : ''}
    </button>` : ''}
    <div class="routine-content">
      <div class="routine-title${done?' done':''}">${r.title}</div>
      <div class="routine-meta">
        ${badge(r.areaId)}
        ${freq ? `<span class="meta-tag">${freq.label}</span>` : ''}
        ${slot && slot.id !== 'anytime' ? `<span class="meta-tag">${slot.label}</span>` : ''}
        ${r.duration ? `<span class="meta-tag">${r.duration} min</span>` : ''}
      </div>
    </div>
    ${opts.actions ? `<div class="action-btns">
      <button class="icon-btn" onclick="openEdit('${r.id}')" aria-label="Edit"><i class="ti ti-edit"></i></button>
      <button class="icon-btn" onclick="delRoutine('${r.id}')" aria-label="Delete"><i class="ti ti-trash"></i></button>
    </div>` : ''}
  </div>`;
}

// ── Views ─────────────────────────────────────────────────────────────────────
function viewToday() {
  const todayR = state.routines.filter(r => isDue(r, TODAY));
  const comp = todayR.filter(r => isDone(r.id)).length;
  const total = todayR.length;
  const pct = total > 0 ? Math.round(comp/total*100) : 0;

  if (total === 0) return `<div class="empty-state">
    <i class="ti ti-sparkles"></i>
    <p class="empty-title">Nothing on the schedule today</p>
    <p style="font-size:14px;margin-bottom:20px;color:var(--text2)">Add your first routine to get started</p>
    <button class="btn" onclick="openAdd()"><i class="ti ti-plus"></i> Add routine</button>
  </div>`;

  const grouped = {morning:[], afternoon:[], evening:[], anytime:[]};
  todayR.forEach(r => {
    const s = r.timeOfDay || 'anytime';
    if (grouped[s]) grouped[s].push(r); else grouped.anytime.push(r);
  });

  let html = `<div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
    <div style="font-size:13px;font-weight:500">${pct===100?'<span style="color:#3B6D11">All done today ✓</span>':''+comp+' of '+total+' complete'}</div>
    <div style="font-size:12px;color:var(--text2)">${pct}%</div>
  </div>`;

  SLOTS.forEach(slot => {
    const items = grouped[slot.id];
    if (!items || items.length === 0) return;
    html += `<div style="margin-bottom:18px">
      <p class="section-label"><i class="ti ${slot.icon}" style="font-size:13px"></i>${slot.label}</p>`;
    items.forEach(r => { html += routineRow(r, {checkable:true}); });
    html += '</div>';
  });
  return html;
}

function viewWeek() {
  const dates = weekDates();
  let html = '<div class="week-grid">';
  dates.forEach(dateStr => {
    const d = new Date(dateStr + 'T12:00:00');
    const isToday = dateStr === TODAY;
    const isFuture = dateStr > TODAY;
    const dayR = state.routines.filter(r => isDue(r, dateStr));
    const compCount = dayR.filter(r => !!state.completions[ck(r.id, dateStr)]).length;
    html += `<div class="week-cell${isToday?' today':''}">
      <div class="week-dow">${DOW[d.getDay()]}</div>
      <div class="week-dom" style="font-weight:${isToday?500:400}">${d.getDate()}</div>
      <div class="week-dots">`;
    dayR.slice(0,8).forEach(r => {
      const a = getA(r.areaId);
      const c = !!state.completions[ck(r.id, dateStr)];
      html += `<div class="week-dot" title="${r.title}" style="background:${c?a.hex:'transparent'};border:1.5px solid ${a.hex};opacity:${isFuture?.45:1}"></div>`;
    });
    html += `</div>`;
    if (dayR.length > 0) html += `<div class="week-count">${isFuture ? dayR.length+'d' : compCount+'/'+dayR.length}</div>`;
    html += '</div>';
  });
  html += '</div>';

  const todayR = state.routines.filter(r => isDue(r, TODAY));
  if (todayR.length > 0) {
    html += `<p class="section-label" style="margin-top:4px">Today</p>`;
    todayR.forEach(r => { html += routineRow(r, {checkable:true}); });
  }
  return html;
}

function viewRoutines() {
  const areas = AREAS.filter(a => state.routines.some(r => r.areaId === a.id));
  const fa = state.filterArea;

  let html = `<div class="chip-row">
    <button class="chip${fa==='all'?' active':''}" onclick="state.filterArea='all';render()" style="${fa==='all'?'border-color:var(--border2);color:var(--text);font-weight:500':''}">
      All (${state.routines.length})
    </button>`;
  areas.forEach(a => {
    const cnt = state.routines.filter(r => r.areaId === a.id).length;
    const act = fa === a.id;
    html += `<button class="chip${act?' active':''}" onclick="state.filterArea='${a.id}';render()"
      style="${act?`border-color:${a.hex};background:${a.bg};color:${a.dark}`:''}">
      <span class="area-dot" style="background:${a.hex}"></span>${a.name} (${cnt})
    </button>`;
  });
  html += '</div>';

  const filtered = fa === 'all' ? state.routines : state.routines.filter(r => r.areaId === fa);

  ['personal','work'].forEach(type => {
    const items = filtered.filter(r => getA(r.areaId).type === type);
    if (items.length === 0) return;
    html += `<div style="margin-bottom:20px">
      <p class="section-label">${type==='personal'?'Personal — Wheel of Life':'Work & Business'}</p>`;
    items.forEach(r => { html += routineRow(r, {actions:true}); });
    html += '</div>';
  });

  if (filtered.length === 0) {
    html += `<p style="color:var(--text2);font-size:14px;padding:1rem 0">No routines yet. Tap + to add one.</p>`;
  }

  html += `<div style="margin-top:8px">
    <p class="section-label" style="margin-top:20px;margin-bottom:10px">Data & sync</p>
    <div class="sync-bar">
      <button class="btn" onclick="exportData()" style="font-size:13px;min-height:36px;padding:7px 12px"><i class="ti ti-download" style="font-size:16px"></i> Export backup</button>
      <button class="btn" onclick="importData()" style="font-size:13px;min-height:36px;padding:7px 12px"><i class="ti ti-upload" style="font-size:16px"></i> Import backup</button>
    </div>
    <p style="font-size:12px;color:var(--text3)">Export a JSON backup to sync with another device — import it there to transfer your data.</p>
  </div>`;
  return html;
}

function viewProgress() {
  const stats = AREAS.map(area => {
    const aR = state.routines.filter(r => r.areaId === area.id);
    if (aR.length === 0) return {...area, rate:0, due:0};
    let due = 0, done = 0;
    for (let i = 0; i < 30; i++) {
      const d = new Date(TODAY + 'T12:00:00');
      d.setDate(d.getDate() - i);
      const ds2 = ds(d);
      aR.forEach(r => {
        if (isDue(r, ds2)) {
          due++;
          if (state.completions[ck(r.id, ds2)]) done++;
        }
      });
    }
    return {...area, rate: due > 0 ? Math.round(done/due*100) : 0, due};
  });

  // SVG Wheel
  const cx = 120, cy = 120, maxR = 88;
  const wAreas = AREAS.filter(a => a.type === 'personal');
  const n = wAreas.length;
  let pts = [], lines = '', dots = '', labels = '';
  wAreas.forEach((a, i) => {
    const st = stats.find(s => s.id === a.id);
    const rate = (st ? st.rate : 0) / 100;
    const ang = (i/n)*Math.PI*2 - Math.PI/2;
    const r = Math.max(rate*maxR, 4);
    pts.push(`${cx+Math.cos(ang)*r},${cy+Math.sin(ang)*r}`);
    const ox = cx+Math.cos(ang)*maxR, oy = cy+Math.sin(ang)*maxR;
    const lx = cx+Math.cos(ang)*(maxR+15), ly = cy+Math.sin(ang)*(maxR+15);
    const ta = lx < cx-8 ? 'end' : lx > cx+8 ? 'start' : 'middle';
    lines += `<line x1="${cx}" y1="${cy}" x2="${ox}" y2="${oy}" stroke="var(--border2)" stroke-width=".5"/>`;
    dots += `<circle cx="${cx+Math.cos(ang)*r}" cy="${cy+Math.sin(ang)*r}" r="3.5" fill="${a.hex}"/>`;
    labels += `<text x="${lx}" y="${ly+3.5}" font-size="8.5" text-anchor="${ta}" fill="var(--text2)" font-family="'DM Sans',sans-serif">${a.name}</text>`;
  });
  const grids = [.25,.5,.75,1].map(f => `<circle cx="${cx}" cy="${cy}" r="${maxR*f}" fill="none" stroke="var(--border)" stroke-width=".5"/>`).join('');

  let html = `<div class="wheel-wrap">
    <svg viewBox="0 0 240 240" width="200" height="200" aria-label="Wheel of life">
      ${grids}${lines}
      <polygon points="${pts.join(' ')}" fill="#7F77DD" fill-opacity=".14" stroke="#7F77DD" stroke-width="1.5" stroke-opacity=".55"/>
      ${dots}${labels}
    </svg>
  </div>`;

  let hasData = false;
  ['personal','work'].forEach(type => {
    const items = stats.filter(s => s.type === type && s.due > 0);
    if (items.length === 0) return;
    hasData = true;
    html += `<div style="margin-bottom:20px">
      <p class="section-label">${type==='personal'?'Personal — last 30 days':'Work & business — last 30 days'}</p>`;
    items.forEach(s => {
      html += `<div class="stat-row">
        <div style="width:8px;height:8px;border-radius:50%;background:${s.hex};flex-shrink:0"></div>
        <span class="stat-name">${s.name}</span>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${s.rate}%;background:${s.hex}"></div></div>
        <span class="stat-pct">${s.rate}%</span>
      </div>`;
    });
    html += '</div>';
  });

  if (!hasData) {
    html += `<p style="text-align:center;color:var(--text2);font-size:14px;padding:1rem 0">Check off routines to see your progress here.</p>`;
  }
  return html;
}

function viewAddForm() {
  const f = state.form;
  const a = getA(f.areaId);
  const fc = FREQ.find(x => x.id === f.frequency) || FREQ[0];

  let areaHtml = '';
  ['personal','work'].forEach(type => {
    areaHtml += `<div style="margin-bottom:10px">
      <p style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">${type==='personal'?'Personal':'Work'}</p>
      <div class="pill-group">`;
    AREAS.filter(x => x.type === type).forEach(area => {
      const act = f.areaId === area.id;
      areaHtml += `<button class="pill${act?' active':''}" onclick="setF('areaId','${area.id}')"
        style="${act?`border-color:${area.hex};background:${area.bg};color:${area.dark}`:''}">
        <span class="area-dot" style="background:${area.hex}"></span>${area.name}
      </button>`;
    });
    areaHtml += '</div></div>';
  });

  const freqOpts = FREQ.map(x => `<option value="${x.id}"${f.frequency===x.id?' selected':''}>${x.label}</option>`).join('');

  let dowHtml = '';
  if (fc.dow) {
    dowHtml = `<div class="field">
      <label class="field-label">Days of week</label>
      <div class="dow-picker">`;
    DOW.forEach((day, i) => {
      const act = (f.daysOfWeek||[]).includes(i);
      dowHtml += `<button class="dow-btn${act?' active':''}" onclick="togDOW(${i})"
        style="${act?`background:${a.hex}`:''}">
        ${day[0]}
      </button>`;
    });
    dowHtml += '</div></div>';
  }

  let domHtml = fc.dom ? `<div class="field">
    <label class="field-label">Day of month</label>
    <input type="number" min="1" max="28" value="${f.dayOfMonth||1}" oninput="setF('dayOfMonth',parseInt(this.value)||1)" style="max-width:90px">
  </div>` : '';

  let annualHtml = '';
  if (fc.annual) {
    const moOpts = MON.map((m,i) => `<option value="${i}"${f.annualMonth===i?' selected':''}>${m}</option>`).join('');
    annualHtml = `<div class="field" style="display:flex;gap:12px">
      <div style="flex:1">
        <label class="field-label">Month</label>
        <select onchange="setF('annualMonth',parseInt(this.value))">${moOpts}</select>
      </div>
      <div style="flex:0 0 80px">
        <label class="field-label">Day</label>
        <input type="number" min="1" max="31" value="${f.annualDay||1}" oninput="setF('annualDay',parseInt(this.value)||1)">
      </div>
    </div>`;
  }

  const slotPills = SLOTS.map(s => {
    const act = f.timeOfDay === s.id;
    return `<button class="pill${act?' active':''}" onclick="setF('timeOfDay','${s.id}')"
      style="${act?'border-color:var(--border2);background:var(--bg2);color:var(--text)':''}">
      <i class="ti ${s.icon}" style="font-size:14px"></i>${s.label}
    </button>`;
  }).join('');

  const canSave = f.title.trim().length > 0;

  return `<div class="form-view">
    <button class="form-back" onclick="cancelAdd()"><i class="ti ti-arrow-left"></i> Back</button>
    <p class="form-title">${state.editRoutine ? 'Edit routine' : 'New routine'}</p>

    <div class="field">
      <label class="field-label">Name</label>
      <input type="text" value="${f.title||''}" oninput="setF('title',this.value)" placeholder="e.g. Morning meditation" id="titleInput">
    </div>

    <div class="field">
      <label class="field-label">Area of life</label>
      ${areaHtml}
    </div>

    <div class="field" style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:140px">
        <label class="field-label">Frequency</label>
        <select onchange="setF('frequency',this.value);setF('daysOfWeek',[])">${freqOpts}</select>
      </div>
      <div style="flex:0 0 90px">
        <label class="field-label">Duration (min)</label>
        <input type="number" value="${f.duration||''}" oninput="setF('duration',this.value?parseInt(this.value):'')" placeholder="opt.">
      </div>
    </div>

    ${dowHtml}${domHtml}${annualHtml}

    <div class="field">
      <label class="field-label">Time of day</label>
      <div class="pill-group">${slotPills}</div>
    </div>

    <div class="field">
      <label class="field-label">Notes (optional)</label>
      <textarea rows="2" placeholder="Context or details..." oninput="setF('notes',this.value)">${f.notes||''}</textarea>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;padding-bottom:32px">
      <button class="btn" onclick="cancelAdd()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRoutine()" ${!canSave?'disabled':''}
        style="background:${canSave?a.hex:'var(--border)'}">
        ${state.editRoutine ? 'Save changes' : 'Add routine'}
      </button>
    </div>
  </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('app');

  const todayR = state.routines.filter(r => isDue(r, TODAY));
  const comp = todayR.filter(r => isDone(r.id)).length;
  const total = todayR.length;
  const pct = total > 0 ? Math.round(comp/total*100) : 0;

  let content = '';
  if (state.addView) {
    content = viewAddForm();
  } else {
    switch(state.tab) {
      case 'today':    content = viewToday(); break;
      case 'week':     content = viewWeek(); break;
      case 'routines': content = viewRoutines(); break;
      case 'progress': content = viewProgress(); break;
    }
  }

  const tabs = [
    {id:'today',    icon:'ti-sun',          label:'Today'},
    {id:'week',     icon:'ti-calendar-week',label:'Week'},
    {id:'routines', icon:'ti-list-check',   label:'Routines'},
    {id:'progress', icon:'ti-chart-radar',  label:'Progress'},
  ];

  root.innerHTML = `
    <div class="header">
      <div class="header-row">
        <div>
          <div class="app-title">Life OS</div>
          <div class="app-date">${prettify(TODAY)}</div>
        </div>
        ${!state.addView && total > 0 ? `<div style="text-align:right;font-size:13px;color:var(--text2);font-weight:400">${comp}<span style="font-weight:500;color:var(--text)">/${total}</span> today</div>` : ''}
      </div>
      ${!state.addView && total > 0 ? `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>` : ''}
    </div>

    <div class="scroll-area" style="position:relative">
      ${content}
    </div>

    ${!state.addView ? `<button class="fab" onclick="openAdd()" aria-label="Add routine"><i class="ti ti-plus"></i></button>` : ''}

    <nav class="bottom-nav" aria-label="Main navigation">
      ${tabs.map(t => `<button class="nav-btn${!state.addView && state.tab===t.id?' active':''}" onclick="state.tab='${t.id}';state.addView=false;render()" aria-label="${t.label}">
        <i class="ti ${t.icon}"></i>${t.label}
      </button>`).join('')}
    </nav>
  `;

  // Auto-focus title field when opening add form
  if (state.addView) {
    const ti = document.getElementById('titleInput');
    if (ti) setTimeout(() => ti.focus(), 100);
  }
}

// ── PWA Service Worker (inline) ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'lifeos-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

load();
</script>
